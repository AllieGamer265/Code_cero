<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeCero — Aprende a pensar como programador</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">◈</span>
      <h1>CodeCero</h1>
    </div>
    <div class="header-controls">
      <div class="user-info" id="userInfo">
        <span id="userDisplay" class="user-badge">👤 invitado</span>
        <button id="switchUserBtn" class="btn-tiny" title="Cambiar usuario">🔄</button>
      </div>
      <div class="progress-info">
        <span id="levelDisplay">Nivel 1</span>
        <span id="starCount">★ 0</span>
      </div>
      <button id="darkToggle" aria-label="Modo oscuro">🌙</button>
    </div>
  </header>

  <main>
    <!-- Navegación principal -->
    <div id="mainNav" class="main-nav hidden">
      <button id="navLessons" class="main-nav-btn active">📚 Lecciones</button>
      <button id="navBattles" class="main-nav-btn">⚔️ Batallas</button>
      <button id="navProfile" class="main-nav-btn">👤 Perfil</button>
    </div>

    <!-- Lección -->
    <section id="lessonView">
      <div class="lesson-progress-bar">
        <div id="progressBar" class="progress-fill"></div>
      </div>

      <div id="lessonContent">
        <!-- Se rellena con JS -->
      </div>

      <div class="lesson-nav">
        <button id="prevBtn" class="btn btn-secondary">← Anterior</button>
        <button id="nextBtn" class="btn btn-primary">Siguiente →</button>
      </div>
    </section>

    <!-- Selector de lecciones -->
    <section id="lessonSelector">
      <h2>Tus lecciones</h2>
      <div id="lessonList" class="lesson-grid">
        <!-- Se rellena con JS -->
      </div>
    </section>

    <!-- Perfil -->
    <section id="profileSection" class="section-page" style="display:none;">
      <div id="profileContent">
        <!-- Se rellena con JS -->
      </div>
    </section>

    <!-- Batallas -->
    <section id="battleSection" class="section-page" style="display:none;">
      <div id="battleContent">
        <!-- Se rellena con JS -->
      </div>
    </section>
  </main>

  <!-- Modal de inicio de sesión -->
  <div id="loginModal" class="modal">
    <div class="modal-content login-modal">
      <h2 class="login-modal-title">◈ CodeCero</h2>

      <!-- Menú principal -->
      <div id="authMenu">
        <button id="showLoginBtn" class="btn btn-primary auth-choice">🚀 Iniciar sesión</button>
        <button id="showRegisterBtn" class="btn btn-secondary auth-choice">🔐 Crear cuenta</button>
      </div>

      <!-- Formulario INICIAR SESIÓN -->
      <div id="loginPanel" class="login-panel">
        <div class="login-form">
          <label class="login-label">Usuario</label>
          <input type="text" id="loginNameInput" class="login-input" placeholder="Tu usuario..." maxlength="20" autocomplete="off">
          <label class="login-label">PIN</label>
          <input type="password" id="loginPinInput" class="login-input" placeholder="Tu PIN..." maxlength="6" inputmode="numeric">
          <div id="loginError" class="login-error"></div>
          <button id="loginBtn" class="btn btn-primary" style="width:100%; justify-content:center;">🚀 Entrar</button>
          <button id="loginBackBtn" class="btn-back">← Volver</button>
        </div>
      </div>

      <!-- Formulario CREAR CUENTA -->
      <div id="registerPanel" class="login-panel">
        <div class="login-form">
          <label class="login-label">Usuario</label>
          <input type="text" id="registerNameInput" class="login-input" placeholder="Elige un nombre..." maxlength="20" autocomplete="off">
          <label class="login-label">PIN (4-6 dígitos)</label>
          <input type="password" id="registerPinInput" class="login-input" placeholder="Crea un PIN..." maxlength="6" inputmode="numeric">
          <label class="login-label">Repite el PIN</label>
          <input type="password" id="registerPinConfirmInput" class="login-input" placeholder="Repite el PIN..." maxlength="6" inputmode="numeric">
          <div id="registerError" class="login-error"></div>
          <button id="registerBtn" class="btn btn-primary" style="width:100%; justify-content:center;">🔐 Crear cuenta</button>
          <button id="registerBackBtn" class="btn-back">← Volver</button>
        </div>
      </div>
      <button id="resetDataBtn" class="btn-reset-data">🔄 Resetear datos</button>
    </div>
  </div>

  <footer>
    <p>CodeCero — Aprende lógica de programación desde cero</p>
  </footer>

  <!-- Modal de reto -->
  <div id="challengeModal" class="modal hidden">
    <div class="modal-content">
      <h2>⚔️ Reto de batalla</h2>
      <p id="challengeInfo"></p>
      <div id="challengeActions" class="modal-actions">
        <button id="acceptChallengeBtn" class="btn btn-primary">✅ Aceptar</button>
        <button id="rejectChallengeBtn" class="btn btn-secondary">❌ Rechazar</button>
      </div>
    </div>
  </div>

  <!-- Modal de resultado de batalla -->
  <div id="battleResultModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="battleResultTitle">⚔️ Batalla completada</h2>
      <div id="battleResultContent"></div>
      <div class="modal-actions">
        <button id="battleResultOkBtn" class="btn btn-primary">👍 Entendido</button>
      </div>
    </div>
  </div>

  <!-- Modal de resultado -->
  <div id="resultModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="resultTitle">🎉 Lección completada</h2>
      <div id="resultStars" class="star-display"></div>
      <p id="resultMessage"></p>
      <div class="modal-actions">
        <button id="resultContinueBtn" class="btn btn-primary">Siguiente lección</button>
        <button id="resultRetryBtn" class="btn btn-secondary">Repetir quiz</button>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
