<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeCero — Aprende a pensar como programador</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">◈</span>
      <h1>CodeCero</h1>
    </div>
    <div class="header-controls">
      <div class="user-info" id="userInfo">
        <span id="userDisplay" class="user-badge">👤 invitado</span>
        <button id="switchUserBtn" class="btn-tiny" title="Cambiar usuario">🔄</button>
      </div>
      <div class="progress-info">
        <span id="levelDisplay">Nivel 1</span>
        <span id="starCount">★ 0</span>
      </div>
      <button id="darkToggle" aria-label="Modo oscuro">🌙</button>
    </div>
  </header>

  <main>
    <!-- Lección -->
    <section id="lessonView">
      <div class="lesson-progress-bar">
        <div id="progressBar" class="progress-fill"></div>
      </div>

      <div id="lessonContent">
        <!-- Se rellena con JS -->
      </div>

      <div class="lesson-nav">
        <button id="prevBtn" class="btn btn-secondary">← Anterior</button>
        <button id="nextBtn" class="btn btn-primary">Siguiente →</button>
      </div>
    </section>

    <!-- Selector de lecciones -->
    <section id="lessonSelector">
      <h2>Tus lecciones</h2>
      <div id="lessonList" class="lesson-grid">
        <!-- Se rellena con JS -->
      </div>
    </section>
  </main>

  <!-- Modal de inicio de sesión -->
  <div id="loginModal" class="modal">
    <div class="modal-content login-modal">
      <div class="login-logo">
        <span class="logo-icon" style="font-size:48px;">◈</span>
        <h1 style="font-size:32px; -webkit-text-fill-color: initial; color: var(--primary);">CodeCero</h1>
        <p style="color: var(--text-secondary); margin-bottom: 20px;">Aprende a pensar como programador</p>
      </div>

      <div class="login-tabs">
        <button id="tabLogin" class="login-tab active">Iniciar sesión</button>
        <button id="tabRegister" class="login-tab">Crear cuenta</button>
      </div>

      <!-- Formulario INICIAR SESIÓN -->
      <div id="loginPanel" class="login-panel">
        <div class="login-form">
          <label class="login-label">Usuario</label>
          <input type="text" id="loginNameInput" class="login-input" placeholder="Tu nombre de usuario..." maxlength="20" autocomplete="off">
          <label class="login-label">PIN</label>
          <input type="password" id="loginPinInput" class="login-input" placeholder="Tu PIN..." maxlength="6" inputmode="numeric">
          <div id="loginError" class="login-error hidden">❌ Usuario o PIN incorrecto</div>
          <button id="loginBtn" class="btn btn-primary" style="width:100%; justify-content:center;">🚀 Entrar</button>
        </div>
      </div>

      <!-- Formulario CREAR CUENTA -->
      <div id="registerPanel" class="login-panel hidden">
        <div class="login-form">
          <label class="login-label">Crea un usuario</label>
          <input type="text" id="registerNameInput" class="login-input" placeholder="Elige un nombre..." maxlength="20" autocomplete="off">
          <label class="login-label">Crea un PIN (4-6 dígitos)</label>
          <input type="password" id="registerPinInput" class="login-input" placeholder="Elige un PIN..." maxlength="6" inputmode="numeric">
          <label class="login-label">Repite el PIN</label>
          <input type="password" id="registerPinConfirmInput" class="login-input" placeholder="Repite el PIN..." maxlength="6" inputmode="numeric">
          <div id="registerError" class="login-error hidden"></div>
          <button id="registerBtn" class="btn btn-primary" style="width:100%; justify-content:center;">🔐 Crear cuenta</button>
        </div>
      </div>

      <p class="login-hint">🔒 Tus datos se guardan solo en este dispositivo</p>
    </div>
  </div>

  <footer>
    <p>CodeCero — Aprende lógica de programación desde cero</p>
  </footer>

  <!-- Modal de resultado -->
  <div id="resultModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="resultTitle">🎉 Lección completada</h2>
      <div id="resultStars" class="star-display"></div>
      <p id="resultMessage"></p>
      <div class="modal-actions">
        <button id="resultContinueBtn" class="btn btn-primary">Siguiente lección</button>
        <button id="resultRetryBtn" class="btn btn-secondary">Repetir quiz</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
